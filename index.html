<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musical Typing — MIDI Controller for Logic Pro</title>
<style>
  :root {
    --bg: #1c1c1e;
    --panel: #2a2a2d;
    --white-key: #ffffff;
    --white-key-down: #b8d8ff;
    --black-key: #0a0a0a;
    --black-key-down: #3a6ea8;
    --green: #3d7a3f;
    --green-bright: #57b25a;
    --row-z-a: #e0b03a;  /* yellow  */
    --row-z-b: #d97b2e;  /* orange  */
    --row-a-a: #2ab3a3;  /* teal    */
    --row-a-b: #1a8f82;
    --row-q-a: #3a7bd5;  /* blue    */
    --row-q-b: #2f6fc4;
    --row-n-a: #8e44d8;  /* purple  */
    --row-n-b: #7a35c2;
    --text: #e8e8e8;
    --text-dim: #9a9a9a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Top control bar ─────────────────────────────── */
  #controls {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: var(--panel);
    border-bottom: 1px solid #000;
    flex-wrap: wrap;
  }
  #controls label { font-size: 12px; color: var(--text-dim); }
  select, button {
    background: #3a3a3e;
    color: var(--text);
    border: 1px solid #4a4a4e;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  select:focus, button:focus { outline: none; }
  button:active { background: #4a4a52; }
  .ctl-group { display: flex; align-items: center; gap: 6px; }
  #midiStatus {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 10px;
    background: #5a2626;
    color: #f0b0b0;
  }
  #midiStatus.ok { background: #23492a; color: #a8e0ad; }
  #velSlider { width: 90px; accent-color: var(--green-bright); }
  #velVal { font-variant-numeric: tabular-nums; width: 26px; display: inline-block; text-align: right; font-size: 13px; }
  .kbd-hint {
    font-size: 10px;
    color: var(--text-dim);
    border: 1px solid #4a4a4e;
    border-radius: 4px;
    padding: 1px 5px;
    background: #232326;
  }
  #octaveDisplay { font-size: 13px; width: 34px; text-align: center; font-variant-numeric: tabular-nums; }
  #sharpInd {
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid #4a4a4e;
    border-radius: 8px;
    color: var(--text-dim);
    background: #232326;
  }
  #sharpInd.active {
    background: var(--row-z-a);
    border-color: var(--row-z-a);
    color: #1a1a1a;
  }
  #sharpInd .kbd-hint { margin-left: 4px; }

  /* ── Sustain button (image style) ────────────────── */
  #sustainBtn {
    position: relative;
    width: 130px;
    height: 58px;
    background: var(--green);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: #fff;
    flex-shrink: 0;
  }
  #sustainBtn .sus-label {
    position: absolute; top: 8px; right: 12px;
    font-size: 15px;
  }
  #sustainBtn .sus-key {
    position: absolute; bottom: 8px; left: 12px;
    font-size: 14px; color: rgba(0,0,0,0.55);
  }
  #sustainBtn.active {
    background: var(--green-bright);
    box-shadow: 0 0 14px rgba(87,178,90,0.65);
  }

  /* ── Keyboard area ───────────────────────────────── */
  #pianoWrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px 14px 16px;
    min-height: 0;
    overflow-x: auto;
    overflow-y: hidden;
  }
  #pianoInner { margin: auto 0; }
  /* two stacked strip lanes above and below the keys, mirroring keyboard
     row order bottom-to-top: Z (lowest), A, keys, Q, numbers (highest) */
  #stripTop, #stripBottom { position: relative; height: 18px; }
  #stripTop { margin-bottom: 4px; }
  #stripBottom { margin-top: 6px; }
  .zone-strip { position: absolute; height: 7px; border-radius: 4px; }
  #piano {
    position: relative;
    height: min(240px, 34vh);
  }
  .wkey, .bkey {
    position: absolute;
    top: 0;
    border-radius: 0 0 7px 7px;
    cursor: pointer;
    touch-action: none;
  }
  .wkey {
    background: var(--white-key);
    border: 1px solid #111;
    height: 100%;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding-bottom: 6px;
    gap: 1px;
  }
  .bkey {
    background: var(--black-key);
    border: 1px solid #000;
    height: 58%;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding-bottom: 8px;
    gap: 1px;
    border-radius: 0 0 6px 6px;
    box-shadow: 0 3px 5px rgba(0,0,0,0.6);
  }
  .wkey.down { background: var(--white-key-down); }
  .bkey.down { background: var(--black-key-down); }

  .klabel { font-size: 12px; font-weight: 600; line-height: 1.2; pointer-events: none; }
  .wkey .klabel.r-z { color: var(--row-z-b); }
  .wkey .klabel.r-a { color: var(--row-a-b); }
  .wkey .klabel.r-q { color: var(--row-q-b); }
  .wkey .klabel.r-n { color: var(--row-n-b); }
  .bkey .klabel.r-z { color: #f0b070; }
  .bkey .klabel.r-a { color: #7fe0d4; }
  .bkey .klabel.r-q { color: #9fc2f5; }
  .bkey .klabel.r-n { color: #c9a8f5; }
  .note-name {
    font-size: 9px;
    color: #b0b0b0;
    pointer-events: none;
    margin-top: 1px;
  }

  #hints {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    padding: 6px 0 10px;
  }
  #hints .kbd-hint { margin: 0 2px; }
</style>
</head>
<body>

<div id="controls">
  <button id="sustainBtn">
    <span class="sus-label">sustain</span>
    <span class="sus-key">tab</span>
  </button>

  <div class="ctl-group">
    <label>MIDI Out</label>
    <select id="midiOut"></select>
    <span id="midiStatus">no MIDI</span>
  </div>

  <div class="ctl-group">
    <label>Ch</label>
    <select id="midiCh"></select>
  </div>

  <div class="ctl-group">
    <label>Key</label>
    <select id="rootSel"></select>
    <select id="scaleSel"></select>
    <span class="kbd-hint">↑ ↓</span>
  </div>

  <div class="ctl-group">
    <span id="sharpInd">♯ sharpen<span class="kbd-hint">space</span></span>
  </div>

  <div class="ctl-group">
    <label>Velocity</label>
    <input type="range" id="velSlider" min="1" max="127" value="100">
    <span id="velVal">100</span>
    <span class="kbd-hint">⇧↑ ⇧↓</span>
  </div>

  <div class="ctl-group">
    <label>Octave</label>
    <button id="octDown">◀</button>
    <span id="octaveDisplay">0</span>
    <button id="octUp">▶</button>
    <span class="kbd-hint">← →</span>
  </div>

  <div class="ctl-group">
    <button id="panicBtn" title="All notes off">Panic</button>
    <span class="kbd-hint">esc</span>
  </div>
</div>

<div id="pianoWrap">
  <div id="pianoInner">
    <div id="stripTop"></div>
    <div id="piano"></div>
    <div id="stripBottom"></div>
  </div>
</div>

<div id="hints">
  Four diatonic rows, one octave each:
  <span class="kbd-hint" style="color:var(--row-z-a)">Z row</span> low →
  <span class="kbd-hint" style="color:var(--row-a-a)">A row</span> →
  <span class="kbd-hint" style="color:var(--row-q-a)">Q row</span> →
  <span class="kbd-hint" style="color:var(--row-n-a)">number row</span> high
  &nbsp;·&nbsp; <span class="kbd-hint">↑ ↓</span> change key
  &nbsp;·&nbsp; hold <span class="kbd-hint">space</span> to sharpen ♯
  &nbsp;·&nbsp; <span class="kbd-hint">← →</span> shift octaves
  &nbsp;·&nbsp; <span class="kbd-hint">⇧↑ ⇧↓</span> velocity
  &nbsp;·&nbsp; hold <span class="kbd-hint">tab</span> to sustain (click button to latch)
</div>

<script>
"use strict";

// Inside the native macOS app, MIDI goes through a WKWebView bridge to
// CoreMIDI (a virtual source named "Musical Typing Keyboard") instead of
// Web MIDI, which WKWebView doesn't support.
const NATIVE_MIDI = !!(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.midi);

/* ── Diatonic row layout ────────────────────────────── */
/* Four keyboard rows = four octaves of the selected key.
   Within a row, each key is the next scale degree; rows longer than the
   scale spill into the next octave (e.g. comma = same note as A). */

const ROWS = [
  { cls: "r-z", oct: 0, codes: ["KeyZ","KeyX","KeyC","KeyV","KeyB","KeyN","KeyM","Comma","Period","Slash"] },
  { cls: "r-a", oct: 1, codes: ["KeyA","KeyS","KeyD","KeyF","KeyG","KeyH","KeyJ","KeyK","KeyL","Semicolon","Quote"] },
  { cls: "r-q", oct: 2, codes: ["KeyQ","KeyW","KeyE","KeyR","KeyT","KeyY","KeyU","KeyI","KeyO","KeyP","BracketLeft","BracketRight"] },
  { cls: "r-n", oct: 3, codes: ["Digit1","Digit2","Digit3","Digit4","Digit5","Digit6","Digit7","Digit8","Digit9","Digit0","Minus","Equal"] },
];
const ROW_COLORS = {
  "r-z": ["var(--row-z-a)", "var(--row-z-b)"],
  "r-a": ["var(--row-a-a)", "var(--row-a-b)"],
  "r-q": ["var(--row-q-a)", "var(--row-q-b)"],
  "r-n": ["var(--row-n-a)", "var(--row-n-b)"],
};
// lane layout: strips mirror keyboard row order (Z below A, Q below numbers)
const ROW_LANE = { "r-z": ["bottom", 10], "r-a": ["bottom", 0], "r-q": ["top", 10], "r-n": ["top", 0] };

const SCALES = {
  "Major": [0,2,4,5,7,9,11],
  "Natural Minor": [0,2,3,5,7,8,10],
  "Harmonic Minor": [0,2,3,5,7,8,11],
  "Hungarian Minor": [0,2,3,6,7,8,11],
  "Romanian Minor": [0,2,3,6,7,9,10],
  "Double Harmonic Major": [0,1,4,5,7,8,11],
  "Persian": [0,1,4,5,6,8,11],
  "Enigmatic": [0,1,4,6,8,10,11],
  "Lydian Augmented": [0,2,4,6,8,9,11],
  "Dorian": [0,2,3,5,7,9,10],
  "Mixolydian": [0,2,4,5,7,9,10],
  "Half-Whole Diminished": [0,1,3,4,6,7,9,10],
  "Prometheus": [0,2,4,6,9,10],
  "Major Pentatonic": [0,2,4,7,9],
  "Minor Pentatonic": [0,3,5,7,10],
  "Hirajoshi": [0,2,3,7,8],
  "Iwato": [0,1,5,6,10],
  "Insen": [0,1,5,7,10],
};
const ROOT_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

const CODE_CHAR = {
  KeyZ:"Z",KeyX:"X",KeyC:"C",KeyV:"V",KeyB:"B",KeyN:"N",KeyM:"M",
  Comma:",",Period:".",Slash:"/",
  KeyA:"A",KeyS:"S",KeyD:"D",KeyF:"F",KeyG:"G",KeyH:"H",KeyJ:"J",KeyK:"K",
  KeyL:"L",Semicolon:";",Quote:"'",
  KeyQ:"Q",KeyW:"W",KeyE:"E",KeyR:"R",KeyT:"T",KeyY:"Y",KeyU:"U",KeyI:"I",
  KeyO:"O",KeyP:"P",BracketLeft:"[",BracketRight:"]",
  Digit1:"1",Digit2:"2",Digit3:"3",Digit4:"4",Digit5:"5",Digit6:"6",
  Digit7:"7",Digit8:"8",Digit9:"9",Digit0:"0",Minus:"-",Equal:"=",
};

const PIANO_LO = 12;   // C0
const PIANO_HI = 108;  // C8
const BASE_DEFAULT = 36; // Z row starts at C2 → A=C3, Q=C4, 1=C5
const BASE_MIN = 12, BASE_MAX = 48;

let base = BASE_DEFAULT;
let root = 0;              // 0=C … 11=B
let scaleName = "Major";
let velocity = 100;
let channel = 0;
let sustainHeld = false;   // tab is physically down
let sustainLatch = false;  // toggled by clicking the button
let sharpHeld = false;     // space is physically down → new notes +1 semitone
let midiAccess = null;
let midiOutPort = null;

const activeNotes = new Map();   // note -> Set of sources ("kbd:KeyA", "mouse")
const codeToNote = new Map();    // physical code -> sounding note (frozen at keydown)
const codeMap = new Map();       // physical code -> {off, cls} for current scale

function buildCodeMap() {
  codeMap.clear();
  const sc = SCALES[scaleName];
  const L = sc.length;
  for (const row of ROWS) {
    row.codes.forEach((code, i) => {
      const off = row.oct * 12 + Math.floor(i / L) * 12 + sc[i % L];
      codeMap.set(code, { off, cls: row.cls });
    });
  }
}

function codeNote(code) {
  const m = codeMap.get(code);
  return m ? base + root + m.off : null;
}

/* ── MIDI ───────────────────────────────────────────── */

const outSel = document.getElementById("midiOut");
const statusEl = document.getElementById("midiStatus");
let userPickedOutput = false; // explicit choice sticks; otherwise auto-pick best

function bestOutput() {
  // Logic's own virtual input beats IAC — it needs zero setup and only
  // exists while Logic is running, which is exactly when we want it
  for (const o of outSel.options) if (/logic pro virtual in/i.test(o.text)) return o.value;
  for (const o of outSel.options) if (/iac/i.test(o.text)) return o.value;
  return "synth";
}

function refreshOutputs() {
  if (NATIVE_MIDI) {
    if (!outSel.options.length) {
      outSel.add(new Option("Logic / DAWs (virtual MIDI out)", "native"));
      outSel.add(new Option("Built-in synth (test)", "synth"));
      outSel.value = "native";
    }
    applyOutput();
    return;
  }
  const prev = outSel.value;
  outSel.innerHTML = "";
  outSel.add(new Option("Built-in synth (test)", "synth"));
  if (midiAccess) {
    for (const out of midiAccess.outputs.values()) {
      outSel.add(new Option(out.name, out.id));
    }
  }
  let pick = bestOutput();
  if (userPickedOutput) {
    for (const o of outSel.options) if (o.value === prev) pick = prev;
  }
  outSel.value = pick;
  applyOutput();
}

function applyOutput() {
  const id = outSel.value;
  midiOutPort = null;
  if (NATIVE_MIDI && id === "native") {
    statusEl.textContent = "→ Musical Typing Keyboard (virtual)";
    statusEl.classList.add("ok");
    return;
  }
  if (midiAccess && id !== "synth") {
    midiOutPort = midiAccess.outputs.get(id) || null;
  }
  if (midiOutPort) {
    statusEl.textContent = "→ " + midiOutPort.name;
    statusEl.classList.add("ok");
  } else if (id === "synth") {
    statusEl.textContent = "built-in synth";
    statusEl.classList.add("ok");
  } else {
    statusEl.textContent = "no MIDI";
    statusEl.classList.remove("ok");
  }
}
outSel.addEventListener("change", () => { userPickedOutput = true; applyOutput(); });

if (NATIVE_MIDI) {
  refreshOutputs();
} else if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess({ sysex: false }).then(acc => {
    midiAccess = acc;
    acc.onstatechange = refreshOutputs;
    refreshOutputs();
  }, () => {
    refreshOutputs();
    statusEl.textContent = "MIDI blocked here — open in Chrome & allow MIDI";
    statusEl.classList.remove("ok");
  });
} else {
  refreshOutputs();
  statusEl.textContent = "Web MIDI unsupported — use Chrome/Edge";
}

function midiSend(bytes) {
  if (NATIVE_MIDI) {
    if (outSel.value === "native") {
      window.webkit.messageHandlers.midi.postMessage(Array.from(bytes));
    }
    return;
  }
  if (midiOutPort) { try { midiOutPort.send(bytes); } catch (e) {} }
}

/* ── Built-in test synth ────────────────────────────── */

let audioCtx = null;
const synthVoices = new Map(); // note -> {osc, osc2, gain}
const synthSustained = new Set();

function synthOn(note, vel) {
  if (outSel.value !== "synth") return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  synthOffNow(note);
  const t = audioCtx.currentTime;
  const freq = 440 * Math.pow(2, (note - 69) / 12);
  const osc = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "triangle"; osc.frequency.value = freq;
  osc2.type = "sine"; osc2.frequency.value = freq * 2;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.25;
  const amp = (vel / 127) * 0.22;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(amp, t + 0.005);
  gain.gain.exponentialRampToValueAtTime(amp * 0.6, t + 0.35);
  osc.connect(gain); osc2.connect(g2); g2.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(); osc2.start();
  synthVoices.set(note, { osc, osc2, gain });
}
function synthOffNow(note) {
  const v = synthVoices.get(note);
  if (!v) return;
  const t = audioCtx.currentTime;
  v.gain.gain.cancelScheduledValues(t);
  v.gain.gain.setValueAtTime(v.gain.gain.value, t);
  v.gain.gain.exponentialRampToValueAtTime(0.0005, t + 0.12);
  v.osc.stop(t + 0.15); v.osc2.stop(t + 0.15);
  synthVoices.delete(note);
  synthSustained.delete(note);
}
function synthOff(note) {
  if (!synthVoices.has(note)) return;
  if (sustainHeld || sustainLatch) { synthSustained.add(note); return; }
  synthOffNow(note);
}
function synthPedalUp() {
  for (const n of [...synthSustained]) synthOffNow(n);
}

/* ── Note on/off with source tracking ───────────────── */

function noteOn(note, source) {
  if (note < 0 || note > 127) return;
  let sources = activeNotes.get(note);
  if (!sources) {
    sources = new Set();
    activeNotes.set(note, sources);
    midiSend([0x90 | channel, note, velocity]);
    synthOn(note, velocity);
    paintKey(note, true);
  }
  sources.add(source);
}

function noteOff(note, source) {
  const sources = activeNotes.get(note);
  if (!sources) return;
  sources.delete(source);
  if (sources.size === 0) {
    activeNotes.delete(note);
    midiSend([0x80 | channel, note, 0]);
    synthOff(note);
    paintKey(note, false);
  }
}

function allNotesOff() {
  for (const note of [...activeNotes.keys()]) {
    midiSend([0x80 | channel, note, 0]);
    paintKey(note, false);
  }
  activeNotes.clear();
  codeToNote.clear();
  setSustain(false, false);
  setSharp(false);
  midiSend([0xB0 | channel, 123, 0]); // CC123 all notes off
  midiSend([0xB0 | channel, 64, 0]);
  for (const n of [...synthVoices.keys()]) synthOffNow(n);
}

/* ── Sustain ────────────────────────────────────────── */

const sustainBtn = document.getElementById("sustainBtn");

function sustainActive() { return sustainHeld || sustainLatch; }

function setSustain(held, latch) {
  const was = sustainActive();
  sustainHeld = held;
  sustainLatch = latch;
  const now = sustainActive();
  if (now !== was) {
    midiSend([0xB0 | channel, 64, now ? 127 : 0]);
    if (!now) synthPedalUp();
  }
  sustainBtn.classList.toggle("active", now);
}

sustainBtn.addEventListener("click", () => setSustain(sustainHeld, !sustainLatch));

/* ── Sharpen modifier ───────────────────────────────── */

const sharpInd = document.getElementById("sharpInd");

function setSharp(on) {
  sharpHeld = on;
  sharpInd.classList.toggle("active", on);
}

/* ── Piano rendering ────────────────────────────────── */

const piano = document.getElementById("piano");
const pianoWrap = document.getElementById("pianoWrap");
const pianoInner = document.getElementById("pianoInner");
const stripTop = document.getElementById("stripTop");
const stripBottom = document.getElementById("stripBottom");
const keyEls = new Map(); // note -> element
const MIN_WHITE_W = 27;

const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function noteName(n) { return NOTE_NAMES[n % 12] + (Math.floor(n / 12) - 1); }
function isBlack(n) { return [1,3,6,8,10].includes(n % 12); }

// white-key index from PIANO_LO for horizontal position
function whiteIndex(n) {
  let idx = 0;
  for (let i = PIANO_LO; i < n; i++) if (!isBlack(i)) idx++;
  return idx;
}
const TOTAL_WHITE = whiteIndex(PIANO_HI) + 1;

function whiteKeyWidth() {
  const avail = pianoWrap.clientWidth - 28; // wrap padding
  return Math.max(MIN_WHITE_W, avail / TOTAL_WHITE);
}

function buildPiano() {
  piano.innerHTML = "";
  keyEls.clear();
  const ww = whiteKeyWidth();
  const bw = ww * 0.62;
  pianoInner.style.width = (ww * TOTAL_WHITE) + "px";

  for (let n = PIANO_LO; n <= PIANO_HI; n++) {
    const el = document.createElement("div");
    el.className = isBlack(n) ? "bkey" : "wkey";
    el.dataset.note = n;
    if (isBlack(n)) {
      const leftWhite = whiteIndex(n - 1);
      el.style.left = ((leftWhite + 1) * ww - bw / 2) + "px";
      el.style.width = bw + "px";
    } else {
      el.style.left = (whiteIndex(n) * ww) + "px";
      el.style.width = ww + "px";
    }
    piano.appendChild(el);
    keyEls.set(n, el);
  }
  paintLabels();
  paintStrips(ww);
}

function rowRange(row) {
  const notes = row.codes.map(c => codeNote(c));
  return [Math.min(...notes), Math.max(...notes)];
}

function paintLabels() {
  for (const el of keyEls.values()) el.innerHTML = "";

  // higher rows painted first so lower rows sit nearer the key's bottom
  // edge, mirroring the physical keyboard's vertical order
  for (const row of [...ROWS].reverse()) {
    for (const code of row.codes) {
      const el = keyEls.get(codeNote(code));
      if (!el) continue;
      const span = document.createElement("span");
      span.className = "klabel " + row.cls;
      span.textContent = CODE_CHAR[code];
      el.appendChild(span);
    }
  }

  // C-note names on white keys for orientation
  for (let n = PIANO_LO; n <= PIANO_HI; n++) {
    if (!isBlack(n) && n % 12 === 0) {
      const span = document.createElement("span");
      span.className = "note-name";
      span.textContent = noteName(n);
      keyEls.get(n).appendChild(span);
    }
  }
}

function paintStrips(ww) {
  stripTop.innerHTML = "";
  stripBottom.innerHTML = "";
  for (const row of ROWS) {
    const [lo, hi] = rowRange(row);
    const [laneName, laneTop] = ROW_LANE[row.cls];
    const [colA, colB] = ROW_COLORS[row.cls];
    const el = document.createElement("div");
    el.className = "zone-strip";
    const x1 = whiteIndexFloor(Math.max(lo, PIANO_LO)) * ww;
    const x2 = (whiteIndexFloor(Math.min(hi, PIANO_HI)) + 1) * ww;
    el.style.left = x1 + "px";
    el.style.width = (x2 - x1) + "px";
    el.style.top = laneTop + "px";
    el.style.background = `linear-gradient(90deg, ${colA}, ${colB})`;
    (laneName === "top" ? stripTop : stripBottom).appendChild(el);
  }
}

// nearest white key at-or-below, as an index (for strip x positions)
function whiteIndexFloor(n) {
  while (isBlack(n)) n--;
  return whiteIndex(n);
}

function paintKey(note, down) {
  const el = keyEls.get(note);
  if (el) el.classList.toggle("down", down);
}

window.addEventListener("resize", buildPiano);

/* ── Key / octave / velocity controls ───────────────── */

const octaveDisplay = document.getElementById("octaveDisplay");
const velSlider = document.getElementById("velSlider");
const velVal = document.getElementById("velVal");
const rootSel = document.getElementById("rootSel");
const scaleSel = document.getElementById("scaleSel");

ROOT_NAMES.forEach((n, i) => rootSel.add(new Option(n, i)));
Object.keys(SCALES).forEach(s => scaleSel.add(new Option(s, s)));

function repaintMapping() {
  buildCodeMap();
  paintLabels();
  paintStrips(whiteKeyWidth());
  scrollToZones();
}

function setRoot(r) {
  root = ((r % 12) + 12) % 12;
  rootSel.value = root;
  repaintMapping();
}

function setScale(s) {
  scaleName = s;
  scaleSel.value = s;
  repaintMapping();
}

function setBase(b) {
  base = Math.max(BASE_MIN, Math.min(BASE_MAX, b));
  const shift = (base - BASE_DEFAULT) / 12;
  octaveDisplay.textContent = shift > 0 ? "+" + shift : String(shift);
  repaintMapping();
}

// keep the mapped rows centered in view
function scrollToZones(smooth = true) {
  const ww = whiteKeyWidth();
  const [lo] = rowRange(ROWS[0]);
  const [, hi] = rowRange(ROWS[ROWS.length - 1]);
  const center = ((whiteIndexFloor(Math.max(lo, PIANO_LO)) +
                   whiteIndexFloor(Math.min(hi, PIANO_HI))) / 2 + 0.5) * ww;
  pianoWrap.scrollTo({
    left: center - pianoWrap.clientWidth / 2,
    behavior: smooth ? "smooth" : "instant",
  });
}

function setVelocity(v) {
  velocity = Math.max(1, Math.min(127, v));
  velSlider.value = velocity;
  velVal.textContent = velocity;
}

rootSel.addEventListener("change", () => setRoot(+rootSel.value));
scaleSel.addEventListener("change", () => setScale(scaleSel.value));
document.getElementById("octDown").addEventListener("click", () => setBase(base - 12));
document.getElementById("octUp").addEventListener("click", () => setBase(base + 12));
velSlider.addEventListener("input", () => setVelocity(+velSlider.value));
document.getElementById("panicBtn").addEventListener("click", allNotesOff);

/* ── Channel selector ───────────────────────────────── */

const chSel = document.getElementById("midiCh");
for (let i = 1; i <= 16; i++) chSel.add(new Option(String(i), i - 1));
chSel.addEventListener("change", () => { channel = +chSel.value; });

/* ── Computer keyboard input ────────────────────────── */

window.addEventListener("keydown", (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.code === "Tab") { e.preventDefault(); if (!e.repeat) setSustain(true, sustainLatch); return; }
  if (e.code === "Space") { e.preventDefault(); if (!e.repeat) setSharp(true); return; }
  if (e.repeat) { if (codeMap.has(e.code)) e.preventDefault(); return; }
  switch (e.code) {
    case "ArrowLeft":  e.preventDefault(); setBase(base - 12); return;
    case "ArrowRight": e.preventDefault(); setBase(base + 12); return;
    case "ArrowUp":    e.preventDefault(); e.shiftKey ? setVelocity(velocity + 10) : setRoot(root + 1); return;
    case "ArrowDown":  e.preventDefault(); e.shiftKey ? setVelocity(velocity - 10) : setRoot(root - 1); return;
    case "Escape":     allNotesOff(); return;
  }
  let note = codeNote(e.code);
  if (note === null) return;
  e.preventDefault();
  if (sharpHeld) note += 1;
  if (codeToNote.has(e.code)) return; // already sounding
  codeToNote.set(e.code, note);       // freeze: key/octave/sharp changes don't strand note-offs
  noteOn(note, "kbd:" + e.code);
});

window.addEventListener("keyup", (e) => {
  if (e.code === "Tab") { e.preventDefault(); setSustain(false, sustainLatch); return; }
  if (e.code === "Space") { e.preventDefault(); setSharp(false); return; }
  const note = codeToNote.get(e.code);
  if (note !== undefined) {
    codeToNote.delete(e.code);
    noteOff(note, "kbd:" + e.code);
  }
});

window.addEventListener("blur", allNotesOff);

/* ── Mouse / touch on the piano ─────────────────────── */

let mouseDown = false;
let mouseNote = null;

function keyFromEvent(e) {
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (el && el.dataset && el.dataset.note !== undefined) return +el.dataset.note;
  return null;
}
piano.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  mouseDown = true;
  const n = keyFromEvent(e);
  if (n !== null) { mouseNote = n; noteOn(n, "mouse"); }
});
window.addEventListener("pointermove", (e) => {
  if (!mouseDown) return;
  const n = keyFromEvent(e);
  if (n !== mouseNote) {
    if (mouseNote !== null) noteOff(mouseNote, "mouse");
    mouseNote = n;
    if (n !== null) noteOn(n, "mouse");
  }
});
window.addEventListener("pointerup", () => {
  mouseDown = false;
  if (mouseNote !== null) { noteOff(mouseNote, "mouse"); mouseNote = null; }
});

/* ── init ───────────────────────────────────────────── */
buildCodeMap();
buildPiano();
setBase(BASE_DEFAULT);
setVelocity(100);
scrollToZones(false);
</script>
</body>
</html>
